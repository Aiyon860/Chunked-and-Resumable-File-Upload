<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Chunked & Resumable File Upload</title>
    </head>
    <body>
        <h1>Chunked & Resumable File Upload</h1>
        <form id="uploadForm" enctype="multipart/form-data">
            <input type="file" id="fileInput" name="file" />
            <button id="uploadBtn">Upload</button>
        </form>
        <p>File Name: <span id="fileName">-</span></p>
        <p>File Size: <span id="fileSize">-</span></p>
        <p>File Type: <span id="fileType">-</span></p>
        <progress id="progressBar" value="0" max="100"></progress>
        <p id="statusText"></p>
        <p id="chunkProgress"></p>
        <p id="speedUpload"></p>
        <p id="remainingTime"></p>
    </body>
    <script src="app.js"></script>
</html>
