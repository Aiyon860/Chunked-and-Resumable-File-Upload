<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="description" content="A portfolio-grade demo of chunked and resumable file uploads built with Vanilla JS, Node.js, Express, and Multer." />
        <title>Chunked &amp; Resumable File Upload</title>
        <link rel="icon" href="favicon.ico" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
        <style>
            :root {
                --color-teal:         oklch(45% 0.12 195);
                --color-teal-hover:   oklch(38% 0.12 195);
                --color-teal-subtle:  oklch(45% 0.12 195 / 0.08);
                --color-ink:          oklch(18% 0.008 195);
                --color-ash:          oklch(45% 0.006 195);
                --color-muted:        oklch(62% 0.006 195);
                --color-divider:      oklch(85% 0.006 195);
                --color-stone:        oklch(96.5% 0.004 195);
                --color-stone-deep:   oklch(93% 0.005 195);
                --color-error:        oklch(52% 0.16 25);
                --color-success:      oklch(48% 0.14 155);

                --font-sans: 'Manrope', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
                --text-display:   clamp(1.75rem, 2vw + 1rem, 2.25rem);
                --text-phase-num: clamp(2rem, 3vw + 0.5rem, 2.75rem);
                --text-phase:     0.8125rem;
                --text-body:      0.9375rem;
                --text-label:     0.6875rem;
                --text-value:     1rem;
                --text-metric:    1.125rem;

                --space-4:  4px;  --space-8:  8px;  --space-12: 12px;
                --space-16: 16px; --space-24: 24px; --space-32: 32px;
                --space-48: 48px; --space-64: 64px; --space-96: 96px;

                --ease-out-quart: cubic-bezier(0.25, 1, 0.5, 1);
                --duration-fast:  150ms;
                --duration-base:  250ms;
            }

            @media (prefers-reduced-motion: reduce) {
                :root { --duration-fast: 0ms; --duration-base: 0ms; }
            }

            *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

            html { font-size: 16px; -webkit-text-size-adjust: 100%; }

            body {
                font-family: var(--font-sans);
                font-size: var(--text-body);
                font-weight: 400;
                line-height: 1.6;
                color: var(--color-ink);
                background-color: var(--color-stone);
                font-kerning: normal;
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
                min-height: 100vh;
            }

            /* Layout */
            .page {
                max-width: 640px;
                margin: 0 auto;
                padding: var(--space-64) var(--space-24) var(--space-96);
            }

            @media (min-width: 768px) {
                .page { padding: var(--space-96) var(--space-24) var(--space-96); }
            }

            /* Header */
            .page-title {
                font-size: var(--text-display);
                font-weight: 700;
                line-height: 1.15;
                letter-spacing: -0.02em;
                color: var(--color-ink);
                margin-bottom: var(--space-64);
                text-wrap: balance;
            }

            /* Phases */
            .phase {
                padding-top: var(--space-48);
                padding-bottom: var(--space-48);
                border-top: 1px solid var(--color-divider);
            }

            .phase:last-child { border-bottom: 1px solid var(--color-divider); }

            .phase-header {
                display: flex;
                align-items: baseline;
                gap: var(--space-16);
                margin-bottom: var(--space-32);
            }

            .phase-number {
                font-size: var(--text-phase-num);
                font-weight: 700;
                line-height: 1;
                color: var(--color-teal);
                font-variant-numeric: tabular-nums;
                letter-spacing: -0.03em;
            }

            .phase-label {
                font-size: var(--text-phase);
                font-weight: 600;
                letter-spacing: 0.08em;
                text-transform: uppercase;
                color: var(--color-ash);
            }

            /* Phase 01: Select */
            .file-input-wrapper {
                position: relative;
                display: flex;
                align-items: center;
                justify-content: center;
                min-height: 120px;
                border: 1px solid var(--color-divider);
                cursor: pointer;
                transition: border-color var(--duration-base) var(--ease-out-quart),
                            background-color var(--duration-base) var(--ease-out-quart);
            }

            .file-input-wrapper:hover {
                border-color: var(--color-teal);
                background-color: var(--color-teal-subtle);
            }

            .file-input-wrapper:focus-within {
                border-color: var(--color-teal);
                outline: 2px solid var(--color-teal);
                outline-offset: 2px;
            }

            .file-input-wrapper:has(#fileInput:disabled) {
                opacity: 0.4;
                cursor: not-allowed;
                pointer-events: none;
            }

            .file-input-label {
                font-size: var(--text-body);
                color: var(--color-muted);
                pointer-events: none;
            }

            #fileInput {
                position: absolute;
                inset: 0;
                opacity: 0;
                cursor: pointer;
                width: 100%;
                height: 100%;
            }

            .file-meta {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: var(--space-24);
                margin-top: var(--space-32);
            }

            .meta-group {
                display: flex;
                flex-direction: column;
                gap: var(--space-4);
            }

            .meta-label {
                font-size: var(--text-label);
                font-weight: 600;
                letter-spacing: 0.08em;
                text-transform: uppercase;
                color: var(--color-muted);
            }

            .meta-value {
                font-size: var(--text-value);
                font-weight: 500;
                color: var(--color-ink);
                font-variant-numeric: tabular-nums;
                word-break: break-all;
            }

            /* Status text */
            #statusText {
                margin-top: var(--space-16);
                font-size: var(--text-body);
                font-weight: 500;
                color: var(--color-ash);
                min-height: 1.6em;
            }

            #statusText:empty { display: none; }

            /* Actions */
            .actions {
                display: flex;
                align-items: center;
                gap: var(--space-16);
                margin-top: var(--space-32);
            }

            #uploadBtn {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                padding: var(--space-12) var(--space-32);
                font-family: var(--font-sans);
                font-size: var(--text-body);
                font-weight: 600;
                letter-spacing: 0.02em;
                color: var(--color-stone);
                background-color: var(--color-teal);
                border: none;
                cursor: pointer;
                transition: background-color var(--duration-fast) var(--ease-out-quart),
                            opacity var(--duration-fast) var(--ease-out-quart);
                min-height: 44px;
            }

            #uploadBtn:hover:not(:disabled) { background-color: var(--color-teal-hover); }

            #uploadBtn:focus-visible {
                outline: 2px solid var(--color-teal);
                outline-offset: 3px;
            }

            #uploadBtn:disabled { opacity: 0.4; cursor: not-allowed; }

            /* Cancel button (dynamically created by app.js) */
            #cancelUploadBtn[hidden] { display: none; }
            #cancelUploadBtn {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                padding: var(--space-12) var(--space-24);
                margin-top: var(--space-16);
                font-family: var(--font-sans);
                font-size: var(--text-body);
                font-weight: 500;
                color: var(--color-ash);
                background: transparent;
                border: 1px solid var(--color-divider);
                cursor: pointer;
                transition: color var(--duration-fast) var(--ease-out-quart),
                            border-color var(--duration-fast) var(--ease-out-quart);
                min-height: 44px;
            }

            #cancelUploadBtn:hover {
                color: var(--color-error);
                border-color: var(--color-error);
            }

            #cancelUploadBtn:focus-visible {
                outline: 2px solid var(--color-teal);
                outline-offset: 3px;
            }

            /* Phase 02: Transfer */
            #progressBar {
                display: block;
                width: 100%;
                height: 8px;
                appearance: none;
                border: none;
                background-color: var(--color-stone-deep);
            }

            #progressBar::-webkit-progress-bar { background-color: var(--color-stone-deep); }
            #progressBar::-webkit-progress-value {
                background-color: var(--color-teal);
                transition: width var(--duration-base) var(--ease-out-quart);
            }
            #progressBar::-moz-progress-bar { background-color: var(--color-teal); }

            .metrics {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: var(--space-24);
                margin-top: var(--space-24);
                padding-top: var(--space-24);
                border-top: 1px solid var(--color-divider);
            }

            .metric {
                display: flex;
                flex-direction: column;
                gap: var(--space-4);
            }

            .metric-label {
                font-size: var(--text-label);
                font-weight: 600;
                letter-spacing: 0.08em;
                text-transform: uppercase;
                color: var(--color-muted);
            }

            .metric-value {
                font-size: var(--text-metric);
                font-weight: 600;
                color: var(--color-ink);
                font-variant-numeric: tabular-nums;
            }

            .metric-value:empty::after {
                content: '\2014';
                color: var(--color-divider);
            }

            /* Phase visibility */
            .phase-hidden {
                display: none;
            }

            /* Phase 03: Complete */
            .result-message {
                padding: var(--space-16) var(--space-24);
                font-size: var(--text-body);
                font-weight: 500;
                line-height: 1.5;
                background-color: oklch(48% 0.14 155 / 0.06);
                color: var(--color-success);
            }

            .error-message {
                padding: var(--space-16) var(--space-24);
                font-size: var(--text-body);
                font-weight: 500;
                line-height: 1.5;
                background-color: oklch(52% 0.16 25 / 0.06);
                color: var(--color-error);
            }

            .phase-complete-note {
                font-size: var(--text-body);
                color: var(--color-muted);
            }

            /* Responsive */
            @media (max-width: 480px) {
                .page { padding: var(--space-32) var(--space-16) var(--space-64); }
                .page-title { margin-bottom: var(--space-32); }
                .phase { padding-top: var(--space-32); padding-bottom: var(--space-32); }
                .phase-header { gap: var(--space-12); margin-bottom: var(--space-24); }
                .phase-number { font-size: 1.75rem; }
                .file-meta { grid-template-columns: 1fr; gap: var(--space-16); }
                .metrics { grid-template-columns: 1fr; gap: var(--space-16); }
                .file-input-wrapper { min-height: 96px; }
            }
        </style>
    </head>
    <body>
        <main class="page">
            <h1 class="page-title">Chunked &amp; Resumable File Upload</h1>

            <!-- PHASE 01: SELECT -->
            <section class="phase" aria-label="File selection">
                <div class="phase-header">
                    <span class="phase-number" aria-hidden="true">01</span>
                    <span class="phase-label">Select</span>
                </div>

                <form id="uploadForm" enctype="multipart/form-data">
                    <div class="file-input-wrapper">
                        <span class="file-input-label">Choose a file or drag it here</span>
                        <input type="file" id="fileInput" name="file" aria-label="Choose a file to upload" />
                    </div>

                    <div class="file-meta">
                        <div class="meta-group">
                            <span class="meta-label">File Name</span>
                            <span class="meta-value" id="fileName">-</span>
                        </div>
                        <div class="meta-group">
                            <span class="meta-label">File Size</span>
                            <span class="meta-value" id="fileSize">-</span>
                        </div>
                        <div class="meta-group">
                            <span class="meta-label">File Type</span>
                            <span class="meta-value" id="fileType">-</span>
                        </div>
                    </div>

                    <p id="statusText" aria-live="polite"></p>

                    <div class="actions">
                        <button type="submit" id="uploadBtn" disabled>Upload</button>
                    </div>
                </form>
                <button id="cancelUploadBtn" class="phase-hidden" hidden>Cancel Upload</button>
            </section>

            <!-- PHASE 02: TRANSFER -->
            <section class="phase phase-hidden" id="phaseTransfer" aria-label="File transfer">
                <div class="phase-header">
                    <span class="phase-number" aria-hidden="true">02</span>
                    <span class="phase-label">Transfer</span>
                </div>

                <progress id="progressBar" value="0" max="100" aria-label="Upload progress"></progress>

                <div class="metrics">
                    <div class="metric">
                        <span class="metric-label">Chunks</span>
                        <span class="metric-value" id="chunkProgress"></span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Speed</span>
                        <span class="metric-value" id="speedUpload"></span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Remaining</span>
                        <span class="metric-value" id="remainingTime"></span>
                    </div>
                </div>
            </section>

            <!-- PHASE 03: COMPLETE -->
            <section class="phase phase-hidden" id="phaseComplete" aria-label="Upload result">
                <div class="phase-header">
                    <span class="phase-number" aria-hidden="true">03</span>
                    <span class="phase-label">Complete</span>
                </div>
                <p class="result-message phase-hidden" id="resultArea" aria-live="polite"></p>
                <p class="error-message phase-hidden" id="errorArea" aria-live="assertive"></p>
                <p class="phase-complete-note" id="completeNote">Waiting for transfer to finish.</p>
            </section>
        </main>

        <script src="app.js"></script>
    </body>
</html>
